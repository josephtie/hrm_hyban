spring.application.name=hyban

server.port=7200

# Configuration CORS pour le frontend
spring.web.cors.allowed-origins=http://localhost:7153,http://192.168.1.5:7153,http://localhost:7200,http://localhost:4200,http://127.0.0.1:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
spring.web.cors.max-age=3600

# Swagger activé pour le développement
springdoc.show-actuator=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Base de données PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/hyban_db_v1
spring.datasource.username=directus
spring.datasource.password=directus
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Upload directory
app.upload-dir=C:/temp/uploads

# Configuration Keycloak OAuth2 pour le développement local
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://192.168.1.2:8080/realms/hyban
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${spring.security.oauth2.resourceserver.jwt.issuer-uri}/protocol/openid-connect/certs

jwt.auth.converter.resource-id=hrm_frontend
jwt.auth.converter.principal-attribute=preferred_username

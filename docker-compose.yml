version: '3.8'

services:

  # 🟦 PostgreSQL pour HRM (backend)
  postgres-hrm:
    image: postgres:15-alpine
    container_name: hrm-postgres
    environment:
      POSTGRES_DB: hyban_db_v1
      POSTGRES_USER: directus
      POSTGRES_PASSWORD: directus
    ports:
      - "5438:5432"
    volumes:
      - postgres_hrm_data:/var/lib/postgresql/data
    networks:
      - hrm_hyban-network
    restart: unless-stopped

  # 🟪 PostgreSQL pour Keycloak
  postgres-keycloak:
    image: postgres:15-alpine
    container_name: keycloak-postgres
    environment:
      POSTGRES_DB: keycloak_db
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    ports:
      - "5437:5432"
    volumes:
      - postgres_keycloak_data:/var/lib/postgresql/data
    networks:
      - hrm_hyban-network
    restart: unless-stopped

  # 🔐 Keycloak
  keycloak:
    image: quay.io/keycloak/keycloak:23.0.6
    container_name: hyban-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin

      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak_db
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
    ports:
      - "8083:8080"
    depends_on:
      - postgres-keycloak
    networks:
      - hrm_hyban-network
    restart: unless-stopped

  # 🧠 Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: hyban-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-hrm:5432/hyban_db_v1
      SPRING_DATASOURCE_USERNAME: directus
      SPRING_DATASOURCE_PASSWORD: directus

      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/hyban

      SERVER_PORT: 7200

    ports:
      - "7200:7200"
    depends_on:
      - postgres-hrm
      - keycloak
    networks:
      - hrm_hyban-network
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped

  # 🎨 Frontend
  frontend:
    build:
      context: ./vue3rhpaie-app
      dockerfile: Dockerfile
    container_name: hyban-frontend
    environment:
      VITE_API_URL: http://backend:7200/api
      VITE_KEYCLOAK_URL: http://keycloak:8080
    ports:
      - "7153:80"
    depends_on:
      - backend
    networks:
      - hrm_hyban-network
    restart: unless-stopped

  #Carbone io generation DOC

  carbone:
    image: carbone/carbone-ee:latest-fonts
    container_name: carbone-server
    restart: always
    ports:
      - "4000:4000"
    environment:
      - CARBONE_EE_LICENSE==test_eyJhbGciOiJFUzUxMiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiIxMjc1NTkzNzU4MTEyNDA5NDUyIiwiYXVkIjoiY2FyYm9uZSIsImV4cCI6MjQyMzc3NzgyNiwiZGF0YSI6eyJ0eXBlIjoidGVzdCJ9fQ.AGHohf8qK1dRXZk6T1R_lkCOdt722zRxktwoX62w-DdjLxpXdIm81QwBYj725bH1q_SZroSIoxvLF-XaSfkEf-WeAJlwPSIHNnxaksSRQCx-dPjUDHphvN47PnKJE3E7dHPBHf36zxSPGhIvCsPG0eOQ-zElaxdbNccBbd1NkIgwWT2w
      - CARBONE_EE_STUDIO=true                # active l'interface web
      - CARBONE_LOG_LEVEL=info
      - CARBONE_TEMPLATES_DIR=/app/templates
      - CARBONE_RENDER_TIMEOUT=60000
    volumes:
      - ./templates:/app/templates
      - ./report:/app/reports
    networks:
      - hrm_hyban-network

volumes:
  postgres_hrm_data:
  postgres_keycloak_data:

networks:
  hrm_hyban-network:
    driver: bridge
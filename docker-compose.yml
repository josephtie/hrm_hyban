version: '3.8'

services:
  # Base de données PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: hyban-postgres
    environment:
      POSTGRES_DB: hyban_db_v1
      POSTGRES_USER: directus
      POSTGRES_PASSWORD: directus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - hyban-network
    restart: unless-stopped

  # Keycloak - Serveur d'authentification
  keycloak:
    image: quay.io/keycloak/keycloak:23.0.6
    container_name: hyban-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8080
      KC_HTTP_ENABLED: true
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false
    ports:
      - "8080:8080"
    command:
      - start-dev
    depends_on:
      - postgres
    networks:
      - hyban-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend Spring Boot
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: hyban-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hyban_db_v1
      SPRING_DATASOURCE_USERNAME: directus
      SPRING_DATASOURCE_PASSWORD: directus
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://192.168.1.2:8080/realms/hyban
      KEYCLOAK_ADMIN_HOST: http://192.168.1.2:8080
      KEYCLOAK_ADMIN_REALM: hyban
      KEYCLOAK_ADMIN_CLIENTID: keycloak-admin-client
      KEYCLOAK_ADMIN_CLIENTSECRET: b6cFLwyL2MakdzHxomjsamxesop9IbIE
      SERVER_PORT: 7200
    ports:
      - "7200:7200"
    depends_on:
      postgres:
        condition: service_started
    networks:
      - hyban-network
    restart: unless-stopped
    volumes:
      - ./uploads:/app/uploads

  # Frontend Vue.js
  frontend:
    build:
      context: ./vue3rhpaie-app
      dockerfile: Dockerfile
    container_name: hyban-frontend
    environment:
      VITE_API_URL: http://192.168.1.2:7200/api
      VITE_KEYCLOAK_URL: http://192.168.1.2:8080
    ports:
      - "7153:80"
    depends_on:
      - backend
    networks:
      - hyban-network
    restart: unless-stopped

  # Nginx Reverse Proxy (Optionnel)
  nginx:
    image: nginx:alpine
    container_name: hyban-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
      - keycloak
    networks:
      - hyban-network
    restart: unless-stopped
    profiles:
      - production

volumes:
  postgres_data:
    driver: local

networks:
  hyban-network:
    driver: bridge

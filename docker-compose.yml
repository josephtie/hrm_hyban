version: '3.8'

services:

  # 🟦 PostgreSQL pour HRM (backend)
  postgres-hrm:
    image: postgres:15-alpine
    container_name: hrm-postgres
    environment:
      POSTGRES_DB: hyban_db_v1
      POSTGRES_USER: directus
      POSTGRES_PASSWORD: directus
    ports:
      - "5438:5432"
    volumes:
      - postgres_hrm_data:/var/lib/postgresql/data
    networks:
      - hrm_hyban-network
    restart: unless-stopped

  # 🟪 PostgreSQL pour Keycloak
  postgres-keycloak:
    image: postgres:15-alpine
    container_name: keycloak-postgres
    environment:
      POSTGRES_DB: keycloak_db
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    ports:
      - "5437:5432"
    volumes:
      - postgres_keycloak_data:/var/lib/postgresql/data
    networks:
      - hrm_hyban-network
    restart: unless-stopped

  # 🔐 Keycloak
  keycloak:
    image: quay.io/keycloak/keycloak:23.0.6
    container_name: hyban-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin

      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak_db
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak

    ports:
      - "8081:8080"
    depends_on:
      - postgres-keycloak
    networks:
      - hrm_hyban-network
    restart: unless-stopped

  # 🧠 Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: hyban-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-hrm:5432/hyban_db_v1
      SPRING_DATASOURCE_USERNAME: directus
      SPRING_DATASOURCE_PASSWORD: directus

      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/hyban

      SERVER_PORT: 7200

    ports:
      - "7200:7200"
    depends_on:
      - postgres-hrm
      - keycloak
    networks:
      - hrm_hyban-network
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped

  # 🎨 Frontend
  frontend:
    build:
      context: ./vue3rhpaie-app
      dockerfile: Dockerfile
    container_name: hyban-frontend
    environment:
      VITE_API_URL: http://backend:7200/api
      VITE_KEYCLOAK_URL: http://keycloak:8080
    ports:
      - "7153:80"
    depends_on:
      - backend
    networks:
      - hrm_hyban-network
    restart: unless-stopped

volumes:
  postgres_hrm_data:
  postgres_keycloak_data:

networks:
  hrm_hyban-network:
    driver: bridge
